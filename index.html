<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Révizio</title>
  <style>
    :root {
      --bg: #f4f2ff;
      --surface: #ffffff;
      --surface-strong: #f1ecff;
      --text: #231f3f;
      --muted: #696d8b;
      --accent: #7B6EF6;
      --accent-soft: rgba(123, 110, 246, 0.12);
      --border: rgba(123, 110, 246, 0.18);
      --card: drop-shadow(0 16px 40px rgba(118, 87, 255, 0.12));
      --danger: #f14668;
      --success: #1aab8b;
      --gold: #d4af37;
    }
    .dark {
      --bg: #11101e;
      --surface: #171428;
      --surface-strong: #221f36;
      --text: #f7f6ff;
      --muted: #a2a2c0;
      --accent-soft: rgba(123, 110, 246, 0.16);
      --border: rgba(255,255,255,0.08);
      --card: drop-shadow(0 16px 40px rgba(0, 0, 0, 0.35));
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; font-family: "Inter", system-ui, sans-serif; background: var(--bg); color: var(--text); }
    body { display: flex; justify-content: center; align-items: flex-start; padding: 24px 0; }
    .app-shell { width: min(1120px, 100%); max-width: 1120px; padding: 0 24px 100px; }
    header { position: sticky; top: 0; z-index: 10; backdrop-filter: blur(14px); background: rgba( var(--bg-rgb, 244,242,255), 0.98); border-bottom: 1px solid rgba(123, 110, 246, 0.12); display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 16px; padding: 20px 24px; border-radius: 28px; margin-bottom: 14px; }
    body.dark header { background: rgba(17,16,30,0.92); border-color: rgba(255,255,255,0.08); }
    .top-buttons { display: flex; gap: 10px; }
    .top-buttons button, .top-buttons span { border: none; background: transparent; color: var(--muted); font-size: 0.95rem; cursor: pointer; }
    .top-buttons button:hover, .top-buttons span:hover { color: var(--text); }
    .header-left, .header-right { display: flex; align-items: center; gap: 12px; }
    .header-left { align-items: flex-start; }
    .header-right { gap: 14px; }
    .brand-icon { width: 44px; height: 44px; border-radius: 16px; display: grid; place-items: center; background: rgba(123,110,246,0.15); color: var(--accent); font-size: 1.2rem; }
    .page-title { margin: 0; font-size: 1.45rem; font-weight: 700; line-height: 1.1; }
    .brand-subtitle { margin: 4px 0 0; font-size: 0.92rem; color: var(--muted); }
    #adminToggle { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 12px; border-radius: 999px; border: 1px solid transparent; background: rgba(123,110,246,0.08); color: var(--muted); cursor: pointer; transition: background .2s ease, color .2s ease, border-color .2s ease; }
    #adminToggle.admin-active { background: rgba(26,171,139,0.12); color: var(--success); border-color: rgba(26,171,139,0.24); }
    main { padding: 0; max-width: 1120px; margin: 0 auto; }
    .top-nav { display: grid; grid-auto-flow: column; gap: 10px; padding: 0 0 18px; overflow-x: auto; }
    .top-nav button { min-width: 120px; border-radius: 18px; border: 1px solid transparent; background: var(--surface); color: var(--muted); padding: 12px 16px; white-space: nowrap; font-size: 0.95rem; display: inline-flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: transform .15s ease, background .2s ease, color .2s ease, box-shadow .2s ease; }
    .top-nav button:hover { transform: translateY(-1px); }
    .top-nav button.active { background: var(--accent); color: #fff; box-shadow: 0 18px 40px rgba(123,110,246,0.16); }
    .top-nav button span { font-size: 1rem; }
    .hero-card { padding: 32px 32px 30px; border-radius: 32px; background: linear-gradient(180deg, rgba(123,110,246,0.16) 0%, rgba(255,255,255,0.96) 100%); border: 1px solid rgba(123,110,246,0.16); }
    .hero-card h1 { margin: 18px 0 12px; font-size: clamp(2.2rem, 6vw, 3rem); line-height: 1.05; }
    .hero-card .subtitle { margin: 0; color: var(--muted); font-size: 1rem; line-height: 1.7; }
    .hero-badge { display: inline-flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 999px; background: rgba(123,110,246,0.14); color: var(--accent); font-size: 0.94rem; margin-bottom: 14px; }
    .section-step { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 999px; background: var(--accent); color: #fff; font-weight: 700; margin-bottom: 14px; }
    .subject-button.active { background: var(--accent); color: #fff; border-color: transparent; }
    .group-label { margin: 20px 0 8px; font-size: 0.78rem; letter-spacing: 0.16em; color: var(--muted); text-transform: uppercase; }
    .button-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .button-grid.five { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    .button-grid.four { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .button-grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .button-grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .button-outline { background: var(--surface); color: var(--text); border-color: rgba(123,110,246,0.14); }
    .button-outline.active { background: rgba(123,110,246,0.12); color: var(--accent); border-color: rgba(123,110,246,0.24); }
    @media (max-width: 1100px) {
      .app-shell { width: min(96vw, 100%); }
      .button-grid.five { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .button-grid.four { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .button-grid.three { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 900px) {
      .app-shell { padding: 0 16px 88px; }
      header { padding: 16px 16px; }
      .top-nav { gap: 8px; }
      .button-grid.five { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .button-grid.four { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .button-grid.three { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .button-grid.two { grid-template-columns: repeat(1, minmax(0, 1fr)); }
      .header-left, .header-right { width: 100%; justify-content: space-between; }
    }
    @media (max-width: 520px) {
      body { padding: 12px 0; }
      header { padding: 14px 12px; border-radius: 24px; }
      .page-title { font-size: 1.15rem; }
    }
    @media (max-width: 520px) {
      body { padding: 12px 0; }
      header { padding: 14px 12px; border-radius: 24px; }
      .page-title { font-size: 1.15rem; }
    }
    .section-card, .card { background: var(--surface); border-radius: 24px; padding: 18px; border: 1px solid var(--border); box-shadow: var(--card); margin-bottom: 16px; }
    .section-card h2, .card h3 { margin: 0 0 12px; font-size: 1rem; }
    .grid { display: grid; gap: 12px; }
    .button-grid { display: grid; gap: 12px; }
    .button-grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    button, .pill { width: 100%; display: inline-flex; align-items: center; justify-content: center; gap: 8px; border-radius: 16px; border: 1px solid transparent; background: var(--accent); color: #fff; padding: 14px 16px; font-size: 0.96rem; cursor: pointer; transition: transform .12s ease, background .2s ease; }
    button:hover, .pill:hover { transform: translateY(-1px); }
    .button-outline { background: transparent; color: var(--text); border-color: var(--border); }
    .button-soft { background: var(--accent-soft); color: var(--accent); border-color: transparent; }
    .subject-button { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--surface-strong); color: var(--text); border-radius: 20px; border: 1px solid var(--border); }
    .badge { background: rgba(123, 110, 246, 0.1); color: var(--accent); padding: 6px 10px; border-radius: 999px; font-size: 0.86rem; }
    input, textarea, select { width: 100%; border-radius: 16px; border: 1px solid var(--border); background: var(--surface-strong); color: var(--text); padding: 12px 14px; font: inherit; resize: vertical; }
    textarea { min-height: 120px; }
    .alert { padding: 14px 16px; border-radius: 18px; background: rgba(241, 236, 255, 0.9); color: var(--text); border: 1px solid rgba(123, 110, 246, 0.16); margin-bottom: 16px; }
    .small-note { font-size: 0.84rem; color: var(--muted); }
    .result-line { display: flex; justify-content: space-between; gap: 10px; margin: 8px 0; padding: 12px 14px; border-radius: 16px; background: var(--surface-strong); border: 1px solid var(--border); }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; place-items: center; padding: 16px; z-index: 50; }
    .modal-backdrop.active { display: grid; }
    .modal { width: min(420px, 100%); background: var(--surface); border-radius: 28px; padding: 22px; border: 1px solid var(--border); box-shadow: var(--card); }
    .modal h2 { margin-top:0; }
    .modal-close { background: transparent; border: none; font-size: 1.3rem; position: absolute; top: 18px; right: 20px; color: var(--muted); cursor: pointer; }
    .modal-header { position: relative; margin-bottom: 16px; }
    .premium-banner { display: flex; gap: 12px; align-items: center; padding: 16px; border-radius: 22px; background: linear-gradient(135deg, #fff7dc, #f9e5a0); border: 1px solid rgba(212,175,55,.3); color: #4f3b0f; margin-bottom: 16px; }
    .gold-dot { width: 10px; height: 10px; border-radius: 50%; background: #d4af37; }
    .hidden { display: none !important; }
    .center { text-align: center; }
    @media (max-width: 520px) {
      header { padding: 14px 12px; }
      .app-shell { padding-bottom: 108px; }
      .modal { padding: 18px; }
    }
  </style>
</head>
<body>

    const state = {

    const appContent = document.getElementById('appContent');
    const themeToggle = document.getElementById('themeToggle');
    const adminToggle = document.getElementById('adminToggle');
    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalClose = document.getElementById('modalClose');
    const modalBody = document.getElementById('modalBody');

    function init() {
      applyTheme();
      renderNav();
      renderPage();
      adminToggle.addEventListener('click', openAdminModal);
      themeToggle.addEventListener('click', toggleTheme);
      modalClose.addEventListener('click', closeModal);
      modalBackdrop.addEventListener('click', (event) => {
        if (event.target === modalBackdrop) closeModal();
      });
      updateAdminToggle();
      if (!state.progress.stats) {
        state.progress = { stats: { quizCompleted: 0, scoreTotal: 0, bestScore: 0, fichesGenerated: 0 }, history: [] };
      }
      saveProgress();
    }

    function saveProgress() {
      localStorage.setItem('revizioProgress', JSON.stringify(state.progress));
    }

    function updateAdminToggle() {
      adminToggle.textContent = state.adminMode ? 'admin ✅' : 'admin';
      adminToggle.classList.toggle('admin-active', state.adminMode);
    }

    function applyTheme() {
      const dark = localStorage.getItem('revizioTheme') === 'dark';
      document.body.classList.toggle('dark', dark);
      if (dark) {
        themeToggle.textContent = '☀️';
      } else {
        themeToggle.textContent = '🌙';
      }
      const root = document.documentElement;
      const bg = getComputedStyle(document.body).backgroundColor;
      const rgb = bg.match(/\d+,\s*\d+,\s*\d+/);
      if (rgb) root.style.setProperty('--bg-rgb', rgb[0]);
    }

    function toggleTheme() {
      const dark = !document.body.classList.contains('dark');
      localStorage.setItem('revizioTheme', dark ? 'dark' : 'light');
      applyTheme();
    }

    function renderNav() {
      const topNav = document.getElementById('topNav');
      if (topNav) {
        topNav.innerHTML = PAGES.map(page => `
          <button class="${state.page === page.key ? 'active' : ''}" onclick="selectPage('${page.key}')">
            <span>${page.icon}</span>${page.label}
          </button>
        `).join('');
      }
    }

    function selectPage(page) {
      state.page = page;
      renderNav();
      renderPage();
    }

    function shuffle(array) {
      return array.sort(() => Math.random() - 0.5);
    }

    function baseWords(text) {
      return text.toLowerCase().replace(/[^a-zàâçéèêëîïôûùüÿñæœ\s]/gi, '').split(/\s+/).filter(Boolean);
    }

    function generateLocalQuiz(count) {
      const questions = [];
      for (let i = 0; i < count; i += 1) {
        questions.push(generateSubjectQuestion(state.selectedSubject, state.selectedLevel, i + 1));
      }
      return { questions };
    }

    function generateLocalEval(subject, level, count) {
      const items = [];
      for (let i = 1; i <= count; i += 1) {
        items.push({ question: `Question ${i} de ${subject} pour ${level}. Explique en quelques lignes.`, answer: `Réponse attendue sur ${subject}.` });
      }
      return { questions: items };
    }

    function gradeEvalLocal(answers) {
      let score = 0;
      const total = answers.length;
      answers.forEach((item) => {
        const student = (item.student || '').toLowerCase();
        const correct = (item.correct || '').toLowerCase();
        const keywords = baseWords(correct).slice(0, 3);
        const matched = keywords.filter(word => student.includes(word)).length;
        if (matched >= 2) score += 20 / total;
        else if (matched === 1) score += 10 / total;
      });
      score = Math.round(score * 10) / 10;
      if (score > 20) score = 20;
      return {
        score: score || 4,
        appreciation: score >= 16 ? 'Excellent travail !' : score >= 12 ? 'Bon travail, continue comme ça.' : 'Revois tes réponses et retente encore.'
      };
    }

    function assistantLocal(mode, input) {
      const text = input.trim();
      if (!text) return 'Écris une question ou colle ton exercice pour obtenir de l’aide.';
      if (mode === 'corriger') {
        return `Je corrige : ${text.slice(0, 120)}... \n\nVérifie les points suivants : structure claire, réponse complète et orthographe.`;
      }
      if (mode === 'indice') {
        return `Indice : Commence par repérer les données importantes, puis applique-les étape par étape.`;
      }
      if (mode === 'etapes') {
        return `Étapes : 1) Lis l’énoncé. 2) Trouve les données. 3) Formule une méthode. 4) Vérifie ta réponse.`;
      }
      return `Explication : ${text.slice(0, 120)}... \n\nEssaie de réutiliser les mots-clés et de faire des phrases simples.`;
    }

      history[0].response = reply;
      renderAssistantHistory();
    }

    function assistantPremiumTask() {
      const input = prompt('Colle ton devoir ou ta consigne ici :');
      if (!input) return;
      const reply = assistantLocal('premium', input);
      state.assistantHistory.unshift({ user: input, mode: 'premium', response: reply });
      renderAssistantHistory();
    }

    function renderAssistantHistory() {
      const historyHtml = state.assistantHistory.map(entry => `
        <div class="section-card">
          <p><strong>Toi (${entry.mode}) :</strong> ${escapeHtml(entry.user)}</p>
          <p><strong>Réponse IA :</strong></p>
          <p>${escapeHtml(entry.response)}</p>
        </div>
      `).join('');
      const container = document.getElementById('assistantHistory');
      if (container) container.innerHTML = historyHtml;
    }

    function renderProgressPage() {
      const stats = state.progress.stats;
      const average = stats.quizCompleted ? Math.round((stats.scoreTotal / stats.quizCompleted) * 100) / 100 : 0;
      appContent.innerHTML = `
        <div class="section-card hero-card">
          <span class="hero-badge">Suivi de progression</span>
          <h1>Ton historique Révizio</h1>
          <p class="subtitle">Consulte tes scores, tes fiches créées et ton meilleur résultat en un seul endroit.</p>
        </div>
        <div class="section-card">
          <div class="result-line"><span>Quiz complétés</span><strong>${stats.quizCompleted}</strong></div>
          <div class="result-line"><span>Score moyen</span><strong>${average}</strong></div>
          <div class="result-line"><span>Meilleur score</span><strong>${stats.bestScore}</strong></div>
          <div class="result-line"><span>Fiches générées</span><strong>${stats.fichesGenerated}</strong></div>
        </div>
        <div class="section-card">
          <h3>Historique récent</h3>
          ${state.progress.history.length ? state.progress.history.map(item => `
            <div class="result-line"><span>${item.type}</span><strong>${item.score !== undefined ? item.score + '/' + (item.total || '') : item.subject}</strong></div>
            <p class="small-note">${item.level} • ${item.date}</p>
          `).join('') : '<p>Aucun résultat enregistré.</p>'}
        </div>
      `;
    }

    function openAdminModal() {
      modalBody.innerHTML = `
        <p>Entrez le mot de passe admin pour activer le mode Premium.</p>
        <input id="adminPassword" type="password" placeholder="Mot de passe admin" />
        <button onclick="confirmAdmin()">Valider</button>
      `;
      modalBackdrop.classList.add('active');
    }

    function closeModal() {
      modalBackdrop.classList.remove('active');
    }

    function confirmAdmin() {
      const password = document.getElementById('adminPassword').value;
      if (password === ADMIN_PASSWORD) {
        state.adminMode = true;
        localStorage.setItem('revizioAdmin', 'true');
        closeModal();
        updateAdminToggle();
        renderPage();
      } else {
        alert('Mot de passe incorrect');
      }
    }

    function openPaymentModal() {
      modalBody.innerHTML = `
        <div class="premium-banner"><span class="gold-dot"></span><div><strong>Mode Premium</strong><br>Débloque l'accès complet à l'assistant devoirs.</div></div>
        <p>Paiement : 0,50€</p>
        <p>Revolut : @révizio</p>
        <p>Virement bancaire : IBAN à renseigner en message.</p>
        <button onclick="closeModal()">J'ai payé, fermer</button>
      `;
      modalBackdrop.classList.add('active');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML.replace(/\n/g, '<br>');
    }

    window.selectPage = selectPage;
    window.selectLevel = selectLevel;
    window.selectSubject = selectSubject;
    window.prepareQuiz = prepareQuiz;
    window.answerQuiz = answerQuiz;
    window.quizNext = quizNext;
    window.generateFiche = generateFiche;
    window.generateFlashcards = generateFlashcards;
    window.flashcardAnswer = flashcardAnswer;
    window.flashcardNext = flashcardNext;
    window.prepareEval = prepareEval;
    window.gradeEval = gradeEval;
    window.sendAssistant = sendAssistant;
    window.openAdminModal = openAdminModal;
    window.confirmAdmin = confirmAdmin;
    window.openPaymentModal = openPaymentModal;
    window.assistantPremiumTask = assistantPremiumTask;
    window.selectAssistantMode = selectAssistantMode;

    init();
  </script>
</body>
</html>
